spring:
  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:test;MODE=MySQL;NON_KEYWORDS=USER
    username: test
    password: 1234
    driver-class-name: org.h2.Driver
  jpa:
    properties:
      hibernate:
        globally_quoted_identifiers: true
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  cloud:
    config:
      enabled: false

toss:
  secret-key: test_secret_key_1234