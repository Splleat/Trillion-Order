<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>사용자 결제 내역 (목록)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; padding-top: 20px; font-family: 'Pretendard', sans-serif; }
    .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
    .table th { background-color: #0d6efd; color: white; text-align: center; font-weight: normal; }
    .table td { vertical-align: middle; text-align: center; font-size: 14px; }
    .status-badge { font-size: 0.75rem; padding: 5px 8px; border-radius: 12px; font-weight: bold; }
    .status-DONE { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .status-CANCELED { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .status-PARTIAL_CANCELED { background-color: #fff3cd; color: #664d03; border: 1px solid #ffecb5; }
    .user-simulation-box { background-color: #e7f1ff; padding: 15px; border-radius: 8px; border: 1px solid #b6d4fe; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">

  <div class="user-simulation-box">
    <div class="row g-3 align-items-center">
      <div class="col-auto">
        <strong class="text-primary">🕵️ 사용자 시뮬레이션:</strong>
      </div>
      <div class="col-auto">
        <select class="form-select form-select-sm" id="userType">
          <option value="MEMBER">회원 (X-Member-Id)</option>
          <option value="GUEST">비회원 (X-Guest-Id)</option>
        </select>
      </div>
      <div class="col-auto">
        <input type="text" class="form-control form-control-sm" id="userId" placeholder="ID 입력 (예: 1)" value="1">
      </div>
      <div class="col-auto">
        <button class="btn btn-primary btn-sm fw-bold" onclick="loadUserPayments(0)">
          🔍 내 결제 내역 조회
        </button>
      </div>
    </div>
    <div class="form-text mt-2 text-muted small">
      * 조회된 목록에서 '취소/상세' 버튼을 누르면 <b>상품 단위 취소 페이지</b>로 이동합니다.
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold">📋 나의 결제 내역</h4>
    <span class="badge bg-secondary" id="current-id-display">로그인 필요</span>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead>
      <tr>
        <th width="15%">PG사</th>
        <th width="25%">주문번호</th>
        <th width="15%">총 결제금액</th>
        <th width="15%">상태</th>
        <th width="15%">승인일시</th>
        <th width="15%">관리</th>
      </tr>
      </thead>
      <tbody id="payment-list-body">
      <tr><td colspan="6" class="text-center py-4 text-muted">상단 '조회' 버튼을 눌러주세요.</td></tr>
      </tbody>
    </table>
  </div>

  <nav class="mt-4">
    <ul class="pagination justify-content-center" id="pagination"></ul>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let currentPage = 0;
  const pageSize = 10;

  function getHeaders() {
    const userType = document.getElementById("userType").value;
    const userId = document.getElementById("userId").value;

    if (!userId) {
      alert("테스트할 사용자 ID를 입력해주세요.");
      return null;
    }

    const headers = { 'Content-Type': 'application/json' };
    if (userType === 'MEMBER') headers['X-Member-Id'] = userId;
    else headers['X-Guest-Id'] = userId;

    return headers;
  }

  async function loadUserPayments(page) {
    const headers = getHeaders();
    if (!headers) return;

    currentPage = page;
    const tbody = document.getElementById("payment-list-body");
    const userId = document.getElementById("userId").value;
    const userType = document.getElementById("userType").value;

    document.getElementById("current-id-display").innerText = `${userType} : ${userId}`;
    document.getElementById("current-id-display").className = "badge bg-success";

    try {
      const response = await fetch(`/payment?page=${page}&size=${pageSize}&sort=paymentId,desc`, {
        method: 'GET',
        headers: headers
      });

      if (!response.ok) throw new Error(`조회 실패 (${response.status})`);

      const data = await response.json();
      const list = data.content;

      tbody.innerHTML = "";

      if (!list || list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">결제 내역이 없습니다.</td></tr>`;
        return;
      }

      list.forEach(pay => {
        const appAt = pay.approvedAt ? new Date(pay.approvedAt).toLocaleString('ko-KR', {fontSize: '12px'}) : '-';
        const isFullyCanceled = pay.status === 'CANCELED';
        const isPartial = pay.status === 'PARTIAL_CANCELED';

        const btnDisabled = isFullyCanceled ? 'disabled' : '';
        let btnClass = 'btn-outline-primary';
        let btnText = '취소/상세'; // 버튼 텍스트 변경

        if (isFullyCanceled) {
          btnClass = 'btn-secondary';
          btnText = '취소완료';
        } else if (isPartial) {
          btnClass = 'btn-warning text-dark';
          btnText = '추가취소';
        }

        const orderRef = pay.orderNumber || pay.orderId || '-';
        const amountRef = pay.totalAmount !== undefined ? pay.totalAmount : (pay.amount || 0);

        const row = `
          <tr>
            <td><span class="badge bg-light text-dark border">${pay.provider || 'TOSS'}</span></td>
            <td class="fw-bold text-primary">${orderRef}</td>
            <td class="fw-bold">${Number(amountRef).toLocaleString()}원</td>
            <td><span class="status-badge status-${pay.status}">${pay.status}</span></td>
            <td style="font-size: 12px;">${appAt}</td>
            <td>
              <button class="btn btn-sm ${btnClass}"
                      onclick="goToDetailCancel('${orderRef}')" ${btnDisabled}>
                ${btnText}
              </button>
            </td>
          </tr>
        `;
        tbody.innerHTML += row;
      });

      renderPagination(data);

    } catch (error) {
      console.error(error);
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">로드 실패: ${error.message}</td></tr>`;
    }
  }

  function renderPagination(pageData) {
    // (기존 페이지네이션 로직 유지)
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";
    const totalPages = pageData.totalPages;
    const curr = pageData.number;
    let html = `<li class="page-item ${pageData.first ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadUserPayments(${curr - 1})">이전</a></li>`;
    for (let i = 0; i < totalPages; i++) {
      html += `<li class="page-item ${i === curr ? 'active' : ''}"><a class="page-link" href="#" onclick="loadUserPayments(${i})">${i + 1}</a></li>`;
    }
    html += `<li class="page-item ${pageData.last ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadUserPayments(${curr + 1})">다음</a></li>`;
    pagination.innerHTML = html;
  }

  // ✅ 핵심: 상세 페이지로 이동하는 함수
  function goToDetailCancel(orderNumber) {
    const userType = document.getElementById("userType").value;
    const userId = document.getElementById("userId").value;

    // cancel.html로 이동하면서 사용자 정보도 같이 넘김
    window.location.href = `cancel.html?orderNumber=${orderNumber}&userType=${userType}&userId=${userId}`;
  }
</script>
</body>
</html>
