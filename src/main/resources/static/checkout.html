<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>주문서 - NHN Books (Sample Data)</title>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <style>
        /* 기존 스타일 유지 */
        body { font-family: sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; padding-top: 50px; }
        .wrapper { width: 600px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; margin-bottom: 30px; color: #333; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .payment-methods { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .method-btn { padding: 15px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; color: #555; transition: all 0.2s; }
        .method-btn:hover { background-color: #f5f5f5; }
        .method-btn.selected { border-color: #3182f6; background-color: #e8f3ff; color: #3182f6; }
        .submit-btn { width: 100%; padding: 16px; background-color: #3182f6; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .info-box { background: #e8f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; line-height: 1.6; color: #1b64da; }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>주문 / 결제 (DB 연동 테스트)</h1>
    <div class="info-box">
        <strong>[DB 데이터 매핑 확인]</strong><br/>
        주문번호: ORD-SAMPLE-001 (필수)<br/>
        결제금액: 56,000원 (필수)<br/>
        주문자: 테스트 주문자
    </div>

    <div class="input-group">
        <label>주문자명</label>
        <input type="text" id="ordererName" value="테스트 주문자" readonly />
    </div>
    <div class="input-group">
        <label>연락처</label>
        <input type="text" id="ordererContact" value="010-1234-5678" readonly />
    </div>

    <label>결제 수단 선택</label>
    <div class="payment-methods">
        <button class="method-btn selected" onclick="selectMethod('카드')">카드</button>
        <button class="method-btn" onclick="selectMethod('계좌이체')">계좌이체</button>
        <button class="method-btn" onclick="selectMethod('가상계좌')">가상계좌</button>
        <button class="method-btn" onclick="selectMethod('휴대폰')">휴대폰</button>
        <button class="method-btn" onclick="selectMethod('문화상품권')">문화상품권</button>
        <button class="method-btn" onclick="selectMethod('해외간편결제')">해외결제</button>
    </div>

    <button class="submit-btn" id="payment-button" onclick="processPayment()">
        56,000원 결제하기
    </button>
</div>

<script>
    // 테스트용 클라이언트 키 (변경 필요 시 수정)
    const clientKey = "test_ck_vZnjEJeQVxnQWGOa5XOq8PmOoBN0";
    const tossPayments = TossPayments(clientKey);
    let selectedMethod = '카드';

    function selectMethod(method) {
        selectedMethod = method;
        const buttons = document.querySelectorAll('.method-btn');
        buttons.forEach(btn => {
            btn.classList.remove('selected');
            if (btn.innerText === method || (method === '해외간편결제' && btn.innerText === '해외결제')) {
                btn.classList.add('selected');
            }
        });
    }

    async function processPayment() {
        const button = document.getElementById("payment-button");
        button.disabled = true;

        try {
            // [중요] DB에 저장된 주문 정보와 정확히 일치해야 합니다.
            const dbOrderNumber = "ORD-SAMPLE-008";
            const dbAmount = 56000;
            const dbOrderName = "테스트 도서 1 외 1건";
            const dbCustomerName = document.getElementById("ordererName").value;

            // 현재 페이지의 URL 기반으로 success URL 설정 (포트 자동 감지)
            const currentOrigin = window.location.origin;

            // 주의: 만약 Spring Boot 정적 리소스라면 "/success.html", View Controller라면 "/success"
            const successUrl = currentOrigin + "/success.html";
            const failUrl = currentOrigin + "/fail.html";

            await tossPayments.requestPayment(selectedMethod, {
                amount: dbAmount,
                orderId: dbOrderNumber,
                orderName: dbOrderName,
                customerName: dbCustomerName,
                customerEmail: "test@example.com",
                successUrl: successUrl,
                failUrl: failUrl,
            });

        } catch (error) {
            console.error("Error:", error);
            alert("결제 창 호출 실패: " + error.message);
            button.disabled = false;
        }
    }
</script>
</body>
</html>
