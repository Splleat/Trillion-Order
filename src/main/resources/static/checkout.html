<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>주문/결제 - NHN Books</title>
    <script src="https://js.tosspayments.com/v1/payment"></script>
    <style>
        body { font-family: sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; padding-top: 50px; }
        .wrapper { width: 600px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .test-badge { background: #ffeebb; color: #856404; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ffeeba; }
        .submit-btn { width: 100%; padding: 16px; background-color: #3182f6; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>주문 / 결제 테스트</h1>

    <div class="test-badge">
        <label>🕵️ 테스트용 신분 선택 (Role 시뮬레이션)</label>
        <div style="display: flex; gap: 10px;">
            <select id="userType" style="flex: 1;">
                <option value="MEMBER">회원 (Member)</option>
                <option value="GUEST">비회원 (Guest)</option>
            </select>
            <input type="text" id="userId" value="1" placeholder="ID 값 (예: 1 or uuid)" style="flex: 2;">
        </div>
        <p style="font-size: 12px; margin-top: 5px; color: #666;">* 회원은 ID 1, 비회원은 임의의 숫자 입력</p>
    </div>

    <div class="input-group">
        <label>주문번호 (UUID)</label>
        <input type="text" id="orderId" placeholder="자동 생성됨" />
    </div>

    <div class="input-group">
        <label>결제금액</label>
        <input type="text" id="amount" value="15000" />
    </div>

    <div class="input-group">
        <label>주문자명</label>
        <input type="text" id="ordererName" value="테스트 홍길동" />
    </div>

    <button class="submit-btn" id="payment-button" onclick="processPayment()">결제하기</button>
</div>

<script>
    const clientKey = "test_ck_vZnjEJeQVxnQWGOa5XOq8PmOoBN0"; // ★ 본인의 Client Key로 변경 필수 ★
    const tossPayments = TossPayments(clientKey);

    // UUID 생성
    document.getElementById('orderId').value = 'ORD-' + crypto.randomUUID().substring(0,8);

    async function processPayment() {
        const orderIdVal = document.getElementById("orderId").value;
        const amountVal = document.getElementById("amount").value;
        const ordererName = document.getElementById("ordererName").value;

        // 테스트용 신분 정보
        const userType = document.getElementById("userType").value;
        const userId = document.getElementById("userId").value;

        // Role 결정 로직
        let userRole = "GUEST";
        if (userType === "MEMBER") userRole = "ROLE_USER";

        try {
            const currentOrigin = window.location.origin;

            // successUrl에 Role 정보도 같이 넘김
            const successUrl = `${currentOrigin}/success.html?provider=TOSS&userType=${userType}&userId=${userId}&userRole=${userRole}`;
            const failUrl = `${currentOrigin}/fail.html`;

            await tossPayments.requestPayment('카드', {
                amount: Number(amountVal),
                orderId: orderIdVal,
                orderName: "테스트 상품",
                customerName: ordererName,
                successUrl: successUrl,
                failUrl: failUrl,
            });

        } catch (error) {
            alert("결제 창 호출 실패: " + error.message);
        }
    }
</script>
</body>
</html>
