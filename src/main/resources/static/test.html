<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>일반 결제(Core API) 테스트</title>
  <script src="https://js.tosspayments.com/v1/payment"></script>

  <style>
    body { padding: 40px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .container { border: 1px solid #ddd; padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    .input-group { margin-bottom: 15px; width: 100%; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 15px; background-color: #3182f6; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:hover { background-color: #1b64da; }
  </style>
</head>
<body>

<div class="container">
  <h2>Toss 일반 결제 테스트</h2>

  <div class="input-group">
    <label>주문자명</label>
    <input type="text" id="ordererName" value="홍길동" />
  </div>
  <div class="input-group">
    <label>연락처 (숫자만)</label>
    <input type="text" id="ordererContact" value="01012345678" />
  </div>

  <button id="payment-button">결제하기</button>
</div>

<script>
  // 1. 일반 결제용 클라이언트 키
  const clientKey = "test_ck_vZnjEJeQVxnQWGOa5XOq8PmOoBN0";
  const tossPayments = TossPayments(clientKey);

  document.getElementById("payment-button").addEventListener("click", async function () {
    const button = this;
    button.disabled = true;
    button.innerText = "처리 중...";

    try {
      // [Step 1] 백엔드에 주문 생성 요청
      const response = await fetch('/api/orders', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-USER-ID': '1',
          'X-USER-ROLE': 'MEMBER'
        },
        body: JSON.stringify({
          ordererName: document.getElementById("ordererName").value,
          ordererContact: document.getElementById("ordererContact").value,
          orderItems: [
            { bookId: 1, quantity: 2 },
            { bookId: 2, quantity: 1 }
          ]
        })
      });

      if (!response.ok) {
        throw new Error(`주문 생성 실패: ${response.status}`);
      }

      const orderData = await response.json();
      console.log("주문 생성 성공:", orderData);

      // [Step 2] Toss 결제창 호출
      await tossPayments.requestPayment('카드', {
        amount: orderData.totalPrice,
        orderId: orderData.orderNumber, // 서버가 생성한 주문번호
        orderName: "토스 티셔츠 외 1건",
        customerName: orderData.ordererInfo.ordererName,
        customerEmail: "customer@example.com",
        customerMobilePhone: orderData.ordererInfo.ordererContact.replaceAll("-", ""),

        // [중요] 결제 성공 시 이동할 페이지 (success.html)
        successUrl: window.location.origin + "/success.html",
        failUrl: window.location.origin + "/fail.html",
      });

    } catch (error) {
      console.error("Error:", error);
      alert("결제 요청 중 오류가 발생했습니다.\n" + error.message);
      button.disabled = false;
      button.innerText = "결제하기";
    }
  });
</script>

</body>
</html>
