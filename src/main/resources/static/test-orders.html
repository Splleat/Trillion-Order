<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 테스트 페이지</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">주문 테스트 페이지 (Admin)</h1>
    <div class="d-flex justify-content-start mb-3">
        <button id="fetch-btn" class="btn btn-primary">주문 목록 조회 (최신 20개)</button>
    </div>
    <div id="orders-container">
        <!-- 주문 카드들이 여기에 동적으로 추가됩니다. -->
    </div>
</div>

<script>
    document.getElementById('fetch-btn').addEventListener('click', () => {
        const container = document.getElementById('orders-container');
        container.innerHTML = '<div class="text-center">데이터를 불러오는 중...</div>';

        // 'sort' 파라미터를 엔티티의 실제 경로인 'orderDetails.orderDate'로 수정합니다.
        fetch('/orders/admin?page=0&size=20&sort=orderDetails.orderDate,desc', {
            headers: {
                'X-USER-ID': '1',
                'X-USER-ROLE': 'ADMIN'
            },
            cache: 'no-cache' // 브라우저 캐시를 비활성화하여 항상 최신 데이터를 받아옵니다.
        })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => { throw new Error(`HTTP error! status: ${response.status}, message: ${text}`) });
                }
                return response.json();
            })
            .then(data => {
                container.innerHTML = ''; // 기존 내용 초기화
                const orders = data.content;

                if (!orders || orders.length === 0) {
                    container.innerHTML = '<div class="text-center">표시할 주문이 없습니다.</div>';
                    return;
                }

                orders.forEach(order => {
                    const orderCard = document.createElement('div');
                    orderCard.className = 'card mb-4';

                    const orderDate = new Date(order.orderDate).toLocaleString('ko-KR');

                    let itemsHtml = '';
                    order.orderItems.forEach(item => {
                        itemsHtml += `
                            <div class="card mb-2">
                                <div class="card-body">
                                    <h6 class="card-title">주문 상품 #${item.orderItemId}</h6>
                                    <dl class="row mb-0">
                                        <dt class="col-sm-5">책 ID</dt><dd class="col-sm-7">${item.bookId}</dd>
                                        <dt class="col-sm-5">책 이름</dt><dd class="col-sm-7">${item.bookName}</dd>
                                        <dt class="col-sm-5">이미지</dt><dd class="col-sm-7"><a href="${item.bookImage}" target="_blank">링크</a></dd>
                                        <dt class="col-sm-5">수량</dt><dd class="col-sm-7">${item.quantity}개</dd>
                                        <dt class="col-sm-5">단가</dt><dd class="col-sm-7">${item.unitPrice.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">상품 총액(할인 전)</dt><dd class="col-sm-7">${item.totalItemOriginalPrice.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">상품 할인액</dt><dd class="col-sm-7">${item.itemDiscountAmount.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">최종 상품가(할인 후)</dt><dd class="col-sm-7"><strong>${item.totalItemSalePrice.toLocaleString('ko-KR')}원</strong></dd>
                                        <dt class="col-sm-5">포장비</dt><dd class="col-sm-7">${item.packagingPrice.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">상태</dt><dd class="col-sm-7"><span class="badge bg-info">${item.orderItemStatus}</span></dd>
                                    </dl>
                                </div>
                            </div>
                        `;
                    });

                    orderCard.innerHTML = `
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">주문 #${order.orderId} - ${order.orderNumber}</h5>
                            <span class="badge bg-success">${order.orderStatus}</span>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <h6>주문 정보</h6>
                                    <dl class="row">
                                        <dt class="col-sm-5">주문 일시</dt><dd class="col-sm-7">${orderDate}</dd>
                                        <dt class="col-sm-5">회원 ID</dt><dd class="col-sm-7">${order.memberId || '비회원'}</dd>
                                        <dt class="col-sm-5">상품 총액</dt><dd class="col-sm-7">${order.originPrice.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">배송비</dt><dd class="col-sm-7">${order.deliveryFee.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">총 쿠폰 할인액</dt><dd class="col-sm-7">${order.totalCouponDiscount.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">포인트 사용량</dt><dd class="col-sm-7">${order.pointUsage.toLocaleString('ko-KR')}원</dd>
                                        <dt class="col-sm-5">총 결제액</dt><dd class="col-sm-7"><strong>${order.totalPrice.toLocaleString('ko-KR')}원</strong></dd>
                                    </dl>
                                    <h6>주문자 정보</h6>
                                    <dl class="row">
                                        <dt class="col-sm-5">이름</dt><dd class="col-sm-7">${order.ordererInfo.ordererName}</dd>
                                        <dt class="col-sm-5">연락처</dt><dd class="col-sm-7">${order.ordererInfo.ordererContact}</dd>
                                    </dl>
                                    <h6>수령인 정보</h6>
                                    <dl class="row">
                                        <dt class="col-sm-5">이름</dt><dd class="col-sm-7">${order.receiverInfo.receiverName}</dd>
                                        <dt class="col-sm-5">연락처</dt><dd class="col-sm-7">${order.receiverInfo.receiverContact}</dd>
                                        <dt class="col-sm-5">주소</dt><dd class="col-sm-7">${order.receiverInfo.receiverAddress}</dd>
                                    </dl>
                                </div>
                                <div class="col-md-6">
                                    <h6>주문 상품 목록 (${order.orderItems.length}개)</h6>
                                    ${itemsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(orderCard);
                });
            })
            .catch(error => {
                console.error('Error fetching orders:', error);
                container.innerHTML = `<div class="alert alert-danger">데이터를 불러오는 데 실패했습니다: ${error.message}</div>`;
            });
    });
</script>
</body>
</html>
