<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>관리자 결제 관리 - NHN Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; padding-top: 20px; font-family: 'Pretendard', sans-serif; }
    .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
    .table th { background-color: #343a40; color: white; text-align: center; font-weight: normal; }
    .table td { vertical-align: middle; text-align: center; font-size: 14px; }
    .status-badge { font-size: 0.75rem; padding: 5px 8px; border-radius: 12px; font-weight: bold; }
    .status-DONE { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
    .status-CANCELED { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
    .status-PARTIAL_CANCELED { background-color: #fff3cd; color: #664d03; border: 1px solid #ffecb5; }
    .provider-badge { font-weight: bold; color: #0d6efd; background: #e7f1ff; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">💳 결제 내역 관리 (Admin Mode)</h3>
    <button class="btn btn-primary btn-sm" onclick="loadPayments(0)">🔄 목록 새로고침</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead>
      <tr>
        <th width="5%">ID</th>
        <th width="10%">PG사</th> <th width="20%">주문번호</th>
        <th width="10%">금액</th>
        <th width="10%">상태</th>
        <th width="15%">승인일시</th>
        <th width="10%">영수증</th>
        <th width="15%">관리</th>
      </tr>
      </thead>
      <tbody id="payment-list-body"></tbody>
    </table>
  </div>

  <nav class="mt-4">
    <ul class="pagination justify-content-center" id="pagination"></ul>
  </nav>
</div>

<div class="modal fade" id="cancelModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">결제 취소 승인 (관리자)</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-bold">주문 번호</label>
          <input type="text" class="form-control" id="modalOrderNumber" readonly style="background-color: #f8f9fa;">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">취소 사유</label>
          <input type="text" class="form-control" id="modalCancelReason" value="관리자 직권 취소">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">취소 금액 (부분 취소)</label>
          <input type="number" class="form-control" id="modalCancelAmount" placeholder="비워두면 전액 취소">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">닫기</button>
        <button type="button" class="btn btn-danger" onclick="submitCancel()">취소 확정</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let currentPage = 0;
  const pageSize = 10;
  const cancelModal = new bootstrap.Modal(document.getElementById('cancelModal'));

  // ★ 관리자 전용 헤더 정의 (Resolver 통과용)
  const ADMIN_HEADERS = {
    'X-Member-Id': '999',         // 관리자 식별자 (임의)
    'X-Member-Role': 'ROLE_ADMIN' // ★ 필수 권한
  };

  document.addEventListener("DOMContentLoaded", () => {
    loadPayments(0);
  });

  async function loadPayments(page) {
    currentPage = page;
    const tbody = document.getElementById("payment-list-body");

    try {
      const response = await fetch(`/admin/payments?page=${page}&size=${pageSize}&sort=paymentId,desc`, {
        method: 'GET',
        headers: ADMIN_HEADERS // ★ 헤더 주입
      });

      if (!response.ok) throw new Error("데이터 로드 실패");

      const data = await response.json();
      const list = data.content;

      tbody.innerHTML = "";

      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-muted">결제 내역이 없습니다.</td></tr>`;
        return;
      }

      list.forEach(pay => {
        const appAt = pay.approvedAt ? new Date(pay.approvedAt).toLocaleString('ko-KR', {fontSize: '12px'}) : '-';
        const isCanceled = pay.status === 'CANCELED';
        const btnDisabled = isCanceled ? 'disabled' : '';
        const btnClass = isCanceled ? 'btn-secondary' : 'btn-outline-danger';

        const row = `
          <tr>
            <td>${pay.paymentId || '-'}</td>
            <td><span class="provider-badge">${pay.provider || 'TOSS'}</span></td>
            <td class="uuid-text" title="${pay.orderId || pay.orderNumber}">${pay.orderId || pay.orderNumber}</td>
            <td class="fw-bold">${Number(pay.totalAmount).toLocaleString()}원</td>
            <td><span class="status-badge status-${pay.status}">${pay.status}</span></td>
            <td style="font-size: 12px;">${appAt}</td>
            <td>
               ${pay.receiptUrl ? `<a href="${pay.receiptUrl}" target="_blank" class="btn btn-sm btn-link text-decoration-none">보기</a>` : '-'}
            </td>
            <td>
              <button class="btn btn-sm ${btnClass}"
                      onclick="openCancelModal('${pay.orderId || pay.orderNumber}')" ${btnDisabled}>
                ${isCanceled ? '취소됨' : '취소'}
              </button>
            </td>
          </tr>
        `;
        tbody.innerHTML += row;
      });

      renderPagination(data);

    } catch (error) {
      console.error(error);
      tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger">로드 실패</td></tr>`;
    }
  }

  function renderPagination(pageData) {
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";
    const totalPages = pageData.totalPages;
    const curr = pageData.number;

    let html = `<li class="page-item ${pageData.first ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadPayments(${curr - 1})">이전</a></li>`;
    for (let i = 0; i < totalPages; i++) {
      html += `<li class="page-item ${i === curr ? 'active' : ''}"><a class="page-link" href="#" onclick="loadPayments(${i})">${i + 1}</a></li>`;
    }
    html += `<li class="page-item ${pageData.last ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadPayments(${curr + 1})">다음</a></li>`;
    pagination.innerHTML = html;
  }

  function openCancelModal(orderNumber) {
    document.getElementById("modalOrderNumber").value = orderNumber;
    document.getElementById("modalCancelAmount").value = "";
    cancelModal.show();
  }

  async function submitCancel() {
    const orderNumber = document.getElementById("modalOrderNumber").value;
    const reason = document.getElementById("modalCancelReason").value;
    const amountVal = document.getElementById("modalCancelAmount").value;
    const cancelAmount = amountVal ? Number(amountVal) : null;

    if(!confirm("정말로 취소하시겠습니까?")) return;

    try {
      const response = await fetch('/admin/payment/cancel', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...ADMIN_HEADERS // ★ 헤더 병합
        },
        body: JSON.stringify({
          orderNumber: orderNumber,
          cancelReason: reason,
          cancelAmount: cancelAmount
        })
      });

      if (response.ok) {
        alert("취소 완료");
        cancelModal.hide();
        loadPayments(currentPage);
      } else {
        const text = await response.text();
        alert("실패: " + text);
      }
    } catch (e) {
      alert("통신 오류");
    }
  }
</script>
</body>
</html>
