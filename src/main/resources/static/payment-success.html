<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 승인 처리</title>
    <style>body { text-align: center; padding: 50px; font-family: sans-serif; }</style>
</head>
<body>
<h2 id="msg">결제 승인 요청 중입니다...</h2>
<script>
    // [중요] 결제 성공했으니 임시 저장한 주문 정보 삭제 (다음엔 새 주문 생성하도록)
    sessionStorage.removeItem("TEMP_ORDER_DATA_V1");

    const params = new URLSearchParams(window.location.search);
    const requestData = {
        paymentKey: params.get("paymentKey"),
        orderId: params.get("orderId"),
        amount: Number(params.get("amount"))
    };

    fetch(`/payments/success?paymentKey=${requestData.paymentKey}&orderId=${requestData.orderId}&amount=${requestData.amount}`)
        .then(async res => {
            if (!res.ok) throw new Error((await res.json()).message || "승인 실패");
            return res.json();
        })
        .then(data => {
            document.getElementById("msg").innerText = "🎉 결제가 완료되었습니다!";
            document.getElementById("msg").style.color = "green";
        })
        .catch(err => {
            document.getElementById("msg").innerText = "결제 승인 실패: " + err.message;
            document.getElementById("msg").style.color = "red";
        });
</script>
</body>
</html>
