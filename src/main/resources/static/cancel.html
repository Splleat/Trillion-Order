<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>관리자 결제 취소 테스트</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 50px; background-color: #f0f2f5; } /* 관리자 느낌 배경색 변경 */
  </style>
</head>
<body>

<div class="container">
  <div class="card shadow mx-auto" style="max-width: 500px;">
    <div class="card-header bg-dark text-white text-center"> <h4 class="mb-0">관리자 결제 취소 (Admin)</h4>
    </div>
    <div class="card-body p-4">
      <div class="alert alert-info py-2" style="font-size: 0.9rem;">
        ※ 관리자 권한으로 결제를 강제 취소합니다.<br>
        (배송 상태 등은 서비스 로직에서 검증됩니다)
      </div>

      <div class="mb-3">
        <label for="orderNumber" class="form-label fw-bold">주문 번호</label>
        <input type="text" class="form-control" id="orderNumber" placeholder="예: ORD-SAMPLE-001" value="ORD-SAMPLE-002" required>
      </div>

      <div class="mb-3">
        <label for="cancelReason" class="form-label fw-bold">취소 사유</label>
        <input type="text" class="form-control" id="cancelReason" value="관리자 직권 취소" required>
      </div>

      <div class="mb-4">
        <label for="cancelAmount" class="form-label fw-bold">취소할 금액 (부분 취소)</label>
        <input type="number" class="form-control" id="cancelAmount" placeholder="비워두면 전액 취소">
        <div class="form-text text-danger">※ 입력 시 해당 금액만 부분 취소됩니다.</div>
      </div>

      <button id="btn-cancel" class="btn btn-dark w-100 py-2 fw-bold">취소 승인 (Admin)</button>

      <div id="result-area" class="mt-3 alert d-none text-break"></div>
    </div>
  </div>
</div>

<script>
  document.getElementById("btn-cancel").addEventListener("click", async function() {
    const orderNumber = document.getElementById("orderNumber").value;
    const cancelReason = document.getElementById("cancelReason").value;
    const cancelAmountVal = document.getElementById("cancelAmount").value;

    if (!orderNumber) {
      alert("주문 번호를 입력해주세요.");
      return;
    }

    const cancelAmount = cancelAmountVal ? Number(cancelAmountVal) : null;
    const resultArea = document.getElementById("result-area");
    const btn = this;

    // UI 초기화
    resultArea.className = "mt-3 alert d-none";
    btn.disabled = true;
    btn.innerText = "처리 중...";

    try {
      // [핵심 수정] AdminPaymentController 경로와 일치시킴
      // Controller: @RequestMapping("/api/admin/payments") + @PostMapping("/cancel")
      const response = await fetch('/api/admin/payment/cancel', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          // 추후 인증 토큰 필요 시 여기에 추가: 'Authorization': 'Bearer ...'
        },
        body: JSON.stringify({
          orderNumber: orderNumber,
          cancelReason: cancelReason,
          cancelAmount: cancelAmount
        }),
      });

      const text = await response.text();
      resultArea.classList.remove("d-none");

      if (response.ok) {
        resultArea.classList.add("alert-success");
        resultArea.innerHTML = `<strong>✅ 취소 완료</strong><br>${text}`;
      } else {
        resultArea.classList.add("alert-danger");
        try {
          const jsonErr = JSON.parse(text);
          resultArea.innerHTML = `<strong>❌ 오류 발생</strong><br>${jsonErr.message || JSON.stringify(jsonErr)}`;
        } catch (e) {
          resultArea.innerHTML = `<strong>❌ 오류 발생</strong><br>${text}`;
        }
      }

    } catch (error) {
      console.error("Error:", error);
      resultArea.classList.remove("d-none");
      resultArea.classList.add("alert-warning");
      resultArea.innerText = "서버 통신 실패 (콘솔 확인)";
    } finally {
      btn.disabled = false;
      btn.innerText = "취소 승인 (Admin)";
    }
  });
</script>
</body>
</html>
