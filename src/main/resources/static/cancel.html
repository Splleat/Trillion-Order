<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>주문 상세 및 취소</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 30px; background-color: #f0f2f5; font-family: 'Pretendard', sans-serif; }
    .item-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; }
    .item-row:last-child { border-bottom: none; }
    .item-img { width: 50px; height: 70px; object-fit: cover; border-radius: 4px; background: #ddd; margin-right: 15px; }
    .price-text { font-size: 0.9rem; color: #888; }
  </style>
</head>
<body>

<div class="container pb-5">
  <div class="card shadow mx-auto" style="max-width: 700px;">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">주문 상세 및 취소</h5>
      <span class="badge bg-secondary" id="modeBadge">Checking Mode...</span>
    </div>

    <div class="card-body p-4">

      <div class="row g-2 mb-4 align-items-end">
        <div class="col-8">
          <label class="form-label fw-bold">주문 번호 (Order Number)</label>
          <input type="text" class="form-control" id="orderNumber" placeholder="주문번호 입력">
        </div>
        <div class="col-4">
          <button class="btn btn-outline-primary w-100 fw-bold" onclick="loadOrderItems()">
            📋 목록 조회
          </button>
        </div>
      </div>

      <hr>

      <div id="items-container" class="mb-4 d-none">
        <h6 class="fw-bold mb-3">📦 취소할 상품 선택</h6>
        <div class="card bg-light border-0">
          <div class="card-body" id="items-list-body"></div>
        </div>
      </div>

      <div class="bg-white border rounded p-3 mb-3">
        <div class="mb-3">
          <label class="form-label fw-bold">취소 사유</label>
          <input type="text" class="form-control" id="cancelReason" value="단순 변심">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">총 취소 예정 금액</label>
          <div class="input-group">
            <input type="number" class="form-control fw-bold text-danger" id="cancelAmount" readonly>
            <span class="input-group-text">원</span>
          </div>
          <div class="form-text text-danger" id="calc-info">
            * (할인가 + 포장비) / 수량 기준으로 계산됩니다.
          </div>
        </div>

        <button id="btn-cancel" class="btn btn-dark w-100 py-3 fw-bold fs-5" disabled>
          취소 요청 전송
        </button>
      </div>

      <div id="result-area" class="alert d-none text-break"></div>

      <div class="mt-3 text-center">
        <a href="checkout.html" class="btn btn-link text-decoration-none">⬅ 메인으로 돌아가기</a>
      </div>

    </div>
  </div>
</div>

<script>
  // URL 파라미터 파싱
  const params = new URLSearchParams(window.location.search);
  const orderNumParam = params.get('orderNumber');

  // 사용자 정보 파싱 (success.html이나 외부에서 넘어온 값)
  const userType = params.get('userType'); // MEMBER / GUEST
  const userId = params.get('userId');

  // 모드 설정 (userId가 있으면 사용자 모드, 없으면 관리자 모드 간주)
  const isUserMode = !!userId;

  document.addEventListener("DOMContentLoaded", () => {
    if (orderNumParam) {
      document.getElementById("orderNumber").value = orderNumParam;
    }

    // 배지 업데이트
    const badge = document.getElementById("modeBadge");
    if (isUserMode) {
      badge.className = "badge bg-success";
      badge.textContent = `User Mode (${userType}: ${userId})`;
    } else {
      badge.className = "badge bg-secondary";
      badge.textContent = "Admin Mode (Root)";
    }
  });

  // Mock Data (주문 상세 조회 API가 없어서 사용)
  const MOCK_ORDER_RESPONSE = {
    "orderId": 1, "memberId": 1, "orderNumber": "ORD-MOCK", "totalPrice": 90500,
    "orderItems": [
      { "orderItemId": 1, "bookName": "Mock Book 1", "bookImage": "https://via.placeholder.com/50", "quantity": 2, "totalItemSalePrice": 45000, "packagingPrice": 1000 },
      { "orderItemId": 2, "bookName": "Mock Book 2", "bookImage": "https://via.placeholder.com/50", "quantity": 1, "totalItemSalePrice": 22500, "packagingPrice": 500 }
    ]
  };

  async function loadOrderItems() {
    const orderNumber = document.getElementById("orderNumber").value;
    if(!orderNumber) return alert("주문번호를 입력하세요.");

    document.getElementById("items-container").classList.add("d-none");
    document.getElementById("cancelAmount").value = "";
    document.getElementById("btn-cancel").disabled = true;

    // 실제로는 주문 상세 조회 API를 호출해야 함 (여기선 Mock)
    renderItems(MOCK_ORDER_RESPONSE);
  }

  function renderItems(orderData) {
    const container = document.getElementById("items-container");
    const listBody = document.getElementById("items-list-body");
    const currentOrderItems = orderData.orderItems;
    listBody.innerHTML = "";
    container.classList.remove("d-none");

    if(!currentOrderItems || currentOrderItems.length === 0) {
      listBody.innerHTML = "<div class='text-center p-3'>취소 가능한 상품 없음</div>";
      return;
    }

    currentOrderItems.forEach((item, index) => {
      const itemTotalPrice = (item.totalItemSalePrice || 0) + (item.packagingPrice || 0);
      const unitPrice = Math.floor(itemTotalPrice / item.quantity);

      const html = `
        <div class="item-row">
          <div class="me-3">
            <input class="form-check-input item-check" type="checkbox" data-index="${index}" data-unit-price="${unitPrice}" style="transform: scale(1.3); cursor: pointer;">
          </div>
          <img src="${item.bookImage || 'https://via.placeholder.com/50'}" class="item-img" alt="book">
          <div class="flex-grow-1">
            <div class="fw-bold text-dark">${item.bookName}</div>
            <div class="price-text">개당 ${unitPrice.toLocaleString()}원 (${item.quantity}개)</div>
          </div>
          <div class="ms-3" style="width: 80px;">
            <input type="number" class="form-control form-control-sm text-center item-qty" value="${item.quantity}" min="1" max="${item.quantity}" data-index="${index}" disabled>
          </div>
        </div>`;
      listBody.innerHTML += html;
    });

    attachEventListeners();
  }

  function attachEventListeners() {
    const checks = document.querySelectorAll(".item-check");
    const qtys = document.querySelectorAll(".item-qty");
    checks.forEach(chk => chk.addEventListener("change", (e) => {
      const idx = e.target.dataset.index;
      document.querySelector(`.item-qty[data-index="${idx}"]`).disabled = !e.target.checked;
      calculateTotal();
    }));
    qtys.forEach(qty => qty.addEventListener("input", calculateTotal));
  }

  function calculateTotal() {
    let total = 0;
    document.querySelectorAll(".item-check:checked").forEach(chk => {
      const idx = chk.dataset.index;
      const unitPrice = Number(chk.dataset.unitPrice);
      let qty = Number(document.querySelector(`.item-qty[data-index="${idx}"]`).value);
      if(qty < 1) qty = 0;
      total += (unitPrice * qty);
    });
    document.getElementById("cancelAmount").value = total;
    document.getElementById("btn-cancel").disabled = (total <= 0);
  }

  // ★★★ 취소 요청 로직 (헤더 분기 처리 핵심) ★★★
  document.getElementById("btn-cancel").addEventListener("click", async function() {
    const orderNumber = document.getElementById("orderNumber").value;
    const cancelReason = document.getElementById("cancelReason").value;
    const cancelAmount = Number(document.getElementById("cancelAmount").value);
    const resultArea = document.getElementById("result-area");

    this.disabled = true;
    this.innerText = "처리 중...";
    resultArea.className = "alert d-none";

    // 1. 모드에 따른 URL 및 헤더 설정
    let apiUrl;
    let headers = { 'Content-Type': 'application/json' };

    if (isUserMode) {
      // [사용자 모드] -> PaymentController 호출
      apiUrl = '/payment/cancel';
      if (userType === 'MEMBER') {
        headers['X-Member-Id'] = userId;
        headers['X-Member-Role'] = 'ROLE_USER'; // 회원 권한
      } else {
        headers['X-Guest-Id'] = userId;
        headers['X-Member-Role'] = 'GUEST';     // 비회원 권한
      }
    } else {
      // [관리자 모드] -> AdminPaymentController 호출
      apiUrl = '/admin/payment/cancel';
      headers['X-Member-Id'] = '999';         // 관리자 임의 ID
      headers['X-Member-Role'] = 'ROLE_ADMIN'; // 관리자 권한 필수
    }

    console.log(`Sending Request to: ${apiUrl}`, headers);

    try {
      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({
          orderNumber: orderNumber,
          cancelReason: cancelReason,
          cancelAmount: cancelAmount
        }),
      });

      const text = await response.text();
      resultArea.classList.remove("d-none");

      if (response.ok) {
        resultArea.classList.add("alert-success");
        resultArea.innerHTML = `<strong>✅ 취소 성공!</strong><br>환불 금액: ${cancelAmount.toLocaleString()}원`;
      } else {
        resultArea.classList.add("alert-danger");
        try {
          const json = JSON.parse(text);
          resultArea.innerHTML = `<strong>❌ 실패:</strong> ${json.message}`;
        } catch(e) {
          resultArea.innerHTML = `<strong>❌ 실패:</strong> ${text}`;
        }
      }
    } catch (error) {
      console.error(error);
      resultArea.classList.remove("d-none");
      resultArea.classList.add("alert-danger");
      resultArea.innerText = "서버 통신 오류";
    } finally {
      this.disabled = false;
      this.innerText = "취소 요청 전송";
    }
  });
</script>
</body>
</html>
