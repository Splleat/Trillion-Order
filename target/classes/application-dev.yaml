server:
  port: 10407

spring:
  application:
    name: order-service

  # JPA, Datasource, H2 설정
  datasource:
    url: jdbc:h2:mem:test
    username: test
    password: 1234
    dbcp2:
      connection-init-sqls: SELECT 1
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
        use_sql_comments: true
        highlight_sql: true
        auto_quote_keyword: true
        # Order Setting
        globally_quoted_identifiers: true

  # Cloud 설정
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

logging:
  level:
    org.hibernate.type: trace

# Resilience4j 설정
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        sliding-window-type: count-based
        wait-duration-in-open-state:
          seconds: 10
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      book-service: {}
      coupon-service: {}
      member-service: {}

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration:
          seconds: 1
        retry-exceptions:
          - feign.RetryableException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - com.nhnacademy.order.order.exception.OrderCancelFailureException
    instances:
      book-service: {}
      coupon-service: {}
      member-service: {}

# 환경 변수 설정
toss:
  secret-key: ${TOSS_KEY}