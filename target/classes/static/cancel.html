<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 취소 테스트</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow-sm mx-auto" style="max-width: 500px;">
    <div class="card-header bg-danger text-white">
      <h4 class="mb-0">결제 취소 요청</h4>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label for="orderNumber" class="form-label">주문 번호 (DB 저장 값)</label>
        <input type="text" class="form-control" id="orderNumber" placeholder="ORD-..." required>
        <div class="form-text">결제 성공 후 생성된 주문 번호를 입력하세요.</div>
      </div>

      <div class="mb-3">
        <label for="cancelReason" class="form-label">취소 사유</label>
        <input type="text" class="form-control" id="cancelReason" value="단순 변심" required>
      </div>

      <button id="btn-cancel" class="btn btn-danger w-100">결제 취소하기</button>

      <div id="result-area" class="mt-3 alert d-none"></div>
    </div>
  </div>
</div>

<script>
  document.getElementById("btn-cancel").addEventListener("click", async function() {
    const orderNumber = document.getElementById("orderNumber").value;
    const cancelReason = document.getElementById("cancelReason").value;

    if (!orderNumber) {
      alert("주문 번호를 입력해주세요.");
      return;
    }

    const resultArea = document.getElementById("result-area");
    resultArea.classList.add("d-none");
    resultArea.classList.remove("alert-success", "alert-danger");

    try {
      // 결제 취소 API 호출 (포트 10411)
      const response = await fetch('http://localhost:10411/payments/cancel', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          orderNumber: orderNumber,
          cancelReason: cancelReason
        }),
      });

      const text = await response.text();

      resultArea.classList.remove("d-none");
      if (response.ok) {
        resultArea.classList.add("alert-success");
        resultArea.innerHTML = `<strong>성공!</strong> ${text}`;
      } else {
        resultArea.classList.add("alert-danger");
        resultArea.innerHTML = `<strong>실패!</strong> ${text}`;
      }

    } catch (error) {
      console.error("Error:", error);
      alert("통신 오류가 발생했습니다.");
    }
  });
</script>
</body>
</html>
