<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문/결제 - NHN Books</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script src="https://js.tosspayments.com/v1/payment-widget"></script>

  <style>
    .section-title { font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 30px; margin-bottom: 20px; }
    .price-summary { background-color: #f8f9fa; border: 1px solid #ddd; padding: 20px; position: sticky; top: 20px; }
    .total-price { color: #dc3545; font-size: 1.5rem; font-weight: bold; }
  </style>
</head>
<body>

<div class="container mt-5 mb-5">
  <h2 class="mb-4">주문/결제</h2>

  <div class="row">
    <div class="col-md-8">

      <h4 class="section-title">주문 상품 정보 (2건)</h4>
      <table class="table table-bordered align-middle">
        <thead class="table-light">
        <tr>
          <th>상품정보</th>
          <th>수량</th>
          <th>판매가</th>
          <th>합계</th>
        </tr>
        </thead>
        <tbody>
        <tr>
          <td>
            <strong>Java의 정석</strong><br>
            <small class="text-muted">포장: 선물 포장 (+2,000원)</small>
          </td>
          <td class="text-center">2</td>
          <td class="text-end">500,000원</td>
          <td class="text-end">1,000,000원</td>
        </tr>
        <tr>
          <td>
            <strong>NHN 코딩 가이드</strong><br>
            <small class="text-muted">포장: 선택 안함</small>
          </td>
          <td class="text-center">2</td>
          <td class="text-end">15,000원</td>
          <td class="text-end">30,000원</td>
        </tr>
        </tbody>
      </table>

      <h4 class="section-title">주문자 정보</h4>
      <div class="card p-3 mb-3">
        <div class="row mb-2">
          <div class="col-3 fw-bold">이름</div>
          <div class="col-9">홍길동</div>
        </div>
        <div class="row">
          <div class="col-3 fw-bold">연락처</div>
          <div class="col-9">010-1234-5678</div>
        </div>
      </div>

      <h4 class="section-title">배송지 정보</h4>
      <div class="mb-3">
        <label for="receiverName" class="form-label">받는 사람</label>
        <input type="text" class="form-control" id="receiverName" value="김철수" required>
      </div>
      <div class="mb-3">
        <label for="receiverContact" class="form-label">연락처</label>
        <input type="text" class="form-control" id="receiverContact" value="010-9876-5432" placeholder="010-0000-0000" required>
      </div>
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="receiverPostCode" class="form-label">우편번호</label>
          <div class="input-group">
            <input type="text" class="form-control" id="receiverPostCode" value="61455" readonly>
            <button class="btn btn-outline-secondary" type="button" onclick="execDaumPostcode()">주소 찾기</button>
          </div>
        </div>
      </div>
      <div class="mb-3">
        <label for="receiverAddress" class="form-label">주소</label>
        <input type="text" class="form-control" id="receiverAddress" value="광주광역시 동구 제봉로 92 (대성학원)" readonly>
      </div>
      <div class="mb-3">
        <label for="receiverDetailAddress" class="form-label">상세 주소</label>
        <input type="text" class="form-control" id="receiverDetailAddress" placeholder="상세 주소를 입력하세요">
      </div>
      <div class="mb-3">
        <label for="deliveryDate" class="form-label">희망 배송일</label>
        <input type="date" class="form-control" id="deliveryDate" value="2024-07-15" required>
      </div>

      <h4 class="section-title">포인트 / 쿠폰</h4>
      <div class="input-group mb-3">
        <span class="input-group-text">포인트 사용</span>
        <input type="number" class="form-control text-end" id="pointUsage" value="1000">
        <span class="input-group-text">원</span>
      </div>

      <h4 class="section-title">결제 수단</h4>
      <div id="payment-method"></div>
      <div id="agreement"></div>

    </div>

    <div class="col-md-4">
      <div class="price-summary rounded shadow-sm">
        <h4 class="mb-4">결제 금액</h4>
        <div class="d-flex justify-content-between mb-2">
          <span>총 상품금액</span>
          <span>1,030,000원</span>
        </div>
        <div class="d-flex justify-content-between mb-2">
          <span>배송비</span>
          <span>0원</span>
        </div>
        <div class="d-flex justify-content-between mb-3 text-danger">
          <span>할인/포인트</span>
          <span id="discount-display">-1,000원</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <strong style="font-size: 1.2rem;">최종 결제 금액</strong>
          <span class="total-price">1,029,000원</span>
        </div>

        <button id="btn-create-order" class="btn btn-primary w-100 btn-lg py-3">주문하기</button>
      </div>
    </div>
  </div>
</div>

<script>
  // --- 1. Toss Payments 위젯 초기화 ---
  const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm"; // 테스트용 Client Key
  const customerKey = "YbX2HuSlsC9uVJW6NMRMj"; // 내 상점의 고객 식별키 (로그인한 회원 ID 권장)

  const paymentWidget = PaymentWidget(clientKey, customerKey);

  // 결제 금액 (상품 구성에 따라 계산된 최종 금액)
  const paymentAmount = 1029000;

  // 결제 위젯 렌더링
  paymentWidget.renderPaymentMethods(
          "#payment-method",
          { value: paymentAmount },
          { variantKey: "DEFAULT" }
  );

  // 이용약관 렌더링
  paymentWidget.renderAgreement("#agreement", { variantKey: "AGREEMENT" });


  // --- 2. 다음 주소 API ---
  function execDaumPostcode() {
    new daum.Postcode({
      oncomplete: function(data) {
        document.getElementById('receiverPostCode').value = data.zonecode;
        document.getElementById("receiverAddress").value = data.roadAddress;
      }
    }).open();
  }

  // --- 3. 주문하기 및 결제 요청 ---
  document.getElementById("btn-create-order").addEventListener("click", async function() {

    // 입력값 가져오기
    const receiverName = document.getElementById("receiverName").value;
    const receiverContact = document.getElementById("receiverContact").value;
    const receiverPostCode = document.getElementById("receiverPostCode").value;
    const receiverAddress = document.getElementById("receiverAddress").value;
    const deliveryDateInput = document.getElementById("deliveryDate").value;
    const pointUsage = parseInt(document.getElementById("pointUsage").value) || 0;

    // 날짜 포맷팅
    const deliveryDateTime = deliveryDateInput + "T10:00:00";

    // 주문 데이터 구성
    const orderData = {
      ordererName: "홍길동",
      ordererContact: "010-1234-5678",
      deliveryDate: deliveryDateTime,
      receiverName: receiverName,
      receiverContact: receiverContact,
      receiverAddress: receiverAddress,
      receiverPostCode: receiverPostCode,
      nonMemberPassword: null,
      pointUsage: pointUsage,
      orderItems: [
        { bookId: 1, quantity: 2, price: 500000, couponId: 1, packagingId: 2 },
        { bookId: 2, quantity: 2, price: 15000, couponId: null, packagingId: 1 }
      ]
    };

    try {
      // [Step A] 백엔드에 주문 생성 요청
      const response = await fetch('/api/orders', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-USER-ID': '1',       // 회원 ID 헤더
          'X-USER-ROLE': 'MEMBER' // 회원 권한 헤더
        },
        body: JSON.stringify(orderData)
      });

      if (response.ok) {
        const result = await response.json();
        console.log("주문 생성 완료, 주문번호:", result.orderNumber); // 백엔드 응답 필드 확인 필요

        // [Step B] Toss Payments 결제창 호출
        // 주의: customerMobilePhone에는 하이픈(-)을 빼야 합니다.
        const cleanPhone = "01012345678"; // 예시 데이터

        await paymentWidget.requestPayment({
          orderId: result.orderNumber, // 백엔드가 생성해준 주문 번호 사용
          orderName: "Java의 정석 외 1건",
          successUrl: "http://localhost:10411/payments/success", // 성공 리다이렉트
          failUrl: "http://localhost:10411/payments/fail",       // 실패 리다이렉트
          customerEmail: "hong@test.com",
          customerName: "홍길동",
          customerMobilePhone: cleanPhone // 숫자만 입력
        });

      } else {
        const errorText = await response.text();
        alert("주문 생성 실패: " + errorText);
      }
    } catch (error) {
      console.error("Error:", error);
      // 사용자가 결제창을 닫거나 네트워크 오류 시
      // alert("결제가 중단되었거나 오류가 발생했습니다.");
    }
  });
</script>

</body>
</html>
